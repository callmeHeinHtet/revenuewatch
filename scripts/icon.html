<!doctype html>
<html>
<head><meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  /* Size-agnostic: uses vmin so a screenshot at any square viewport scales right. */
  .box {
    width: 100vw; height: 100vh;
    background: radial-gradient(125% 125% at 50% 0%, #1C1810 0%, #0B0A07 70%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .box::after { /* top gold sheen */
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1.5vmin;
    background: linear-gradient(90deg, transparent, #E6CB8B, transparent); opacity: 0.5;
  }
  .ring { position: absolute; width: 70vmin; height: 70vmin; border: 1.4vmin solid #CBA75E; border-radius: 50%; opacity: 0.30; }
  .mono {
    font-family: Georgia, "Times New Roman", serif; font-weight: 700;
    font-size: 40vmin; letter-spacing: -3vmin; line-height: 1;
    color: #CBA75E; text-shadow: 0 1vmin 4vmin rgba(0,0,0,0.5);
  }
</style></head>
<body><div class="box"><div class="ring"></div><div class="mono">RW</div></div></body>
</html>
